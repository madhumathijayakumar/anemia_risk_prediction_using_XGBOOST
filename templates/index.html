<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Anemia Risk Prediction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .survey-card {
        background: white;
        border-radius: 20px;
        padding: 35px;
        width: 100%;
        max-width: 850px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }
      .symptom-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        background: #f8f9fa;
        padding: 15px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="survey-card">
      <h3 class="text-center mb-4 text-primary">
        🩸 Anemia Risk Prediction Survey
      </h3>
      <form action="/predict" method="POST">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Age</label
            ><input
              type="number"
              name="age"
              id="age"
              class="form-control"
              required
            />
          </div>
          <div class="col-md-6">
            <label class="form-label">Gender</label
            ><select name="gender" id="gender" class="form-select">
              <option value="0">Female</option>
              <option value="1">Male</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Diet Quality</label
            ><select name="diet" class="form-select">
              <option value="0">Poor</option>
              <option value="1">Average</option>
              <option value="2">Good</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Physical Activity</label
            ><select name="activity" class="form-select">
              <option value="0">Low</option>
              <option value="1">Moderate</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Iron Intake</label
            ><select name="iron_intake" class="form-select">
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Sleep Duration</label
            ><select name="sleep_duration" class="form-select">
              <option value="0">Short < 6h</option>
              <option value="1">Normal 7-9h</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">BMI</label
            ><select name="bmi" class="form-select">
              <option value="0">Underweight</option>
              <option value="1">Normal</option>
              <option value="2">Overweight</option>
            </select>
          </div>
          <div class="col-md-6" id="m_box">
            <label class="form-label">Menstrual Cycle</label
            ><select name="menstrual_cycle" class="form-select">
              <option value="0">Regular</option>
              <option value="1">Irregular</option>
            </select>
          </div>
        </div>
        <h6 class="mt-4">Symptoms Checklist</h6>
        <div class="symptom-grid">
          <label
            ><input type="checkbox" name="pale_skin" value="1" /> Pale
            Skin</label
          >
          <label
            ><input type="checkbox" name="cold_hands_legs" value="1" /> Cold
            Hands & Legs</label
          >
          <label
            ><input type="checkbox" name="weakness" value="1" /> Weakness</label
          >
          <label
            ><input type="checkbox" name="dizziness" value="1" />
            Dizziness</label
          >
          <label
            ><input type="checkbox" name="short_breath" value="1" /> Short
            Breath</label
          >
          <label
            ><input type="checkbox" name="brittle_nails" value="1" /> Brittle
            Nails</label
          >
          <label
            ><input type="checkbox" name="sore_tongue" value="1" /> Sore
            Tongue</label
          >
          <label><input type="checkbox" name="pica" value="1" /> Pica</label>
          <label
            ><input type="checkbox" name="hair_loss" value="1" /> Hair
            Loss</label
          >
          <label
            ><input type="checkbox" name="poor_concentration" value="1" /> Poor
            Concentration</label
          >
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold">
          Predict Risk Profile
        </button>
      </form>
    </div>
    <script>
      const age = document.getElementById("age");
      const gen = document.getElementById("gender");
      const mBox = document.getElementById("m_box");
      function chk() {
        mBox.style.display =
          age.value < 15 || gen.value == "1" ? "none" : "block";
      }
      age.oninput = chk;
      gen.onchange = chk;
    </script>
  </body>
</html>
